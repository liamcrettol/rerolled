name: Refresh manifest data

# Regenerates the prebuilt weapon/perk tables, activity catalog, and the
# community perk-stat overlay, then commits + pushes any change. A push to main
# auto-triggers a Vercel deploy, so this is how static manifest-derived data
# stays current without anyone needing to run scripts by hand.

on:
  schedule:
    - cron: "0 12 * * 2" # Tuesdays at noon UTC, after the weekly reset
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate weapon/perk tables
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: node scripts/build-weapons-table.mjs

      - name: Regenerate activity catalog
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: node scripts/build-activity-catalog.mjs

      - name: Sync Clarity perk-stat overlay
        run: node scripts/sync-clarity-data.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- lib/bungie/data data/activities; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/bungie/data data/activities
          git commit -m "chore: refresh manifest data [skip ci]"
          git push
