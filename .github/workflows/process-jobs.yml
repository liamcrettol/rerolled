name: Process worker jobs

on:
  # Scheduling moved to Supabase pg_cron (#351, migration 056); kept for manual runs.
  workflow_dispatch: {}

jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger process-jobs
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X GET "$APP_URL/api/cron/process-jobs" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail-with-body
