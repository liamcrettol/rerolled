name: Backfill Crucible map images

# One-time, manually dispatched job to fill in map images for Crucible matches
# imported before the map-image feature. Safe to re-run (idempotent). Remove once
# the backfill is complete.
on:
  workflow_dispatch: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backfill
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X GET "$APP_URL/api/cron/backfill-crucible-images" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail-with-body
