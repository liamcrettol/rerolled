name: Detect games

# Temporarily disabled automatic scheduling while Supabase is recovering from
# resource exhaustion. Keep workflow_dispatch so this can still be run manually
# from the Actions tab after the database is stable.
#
# Requires two repository secrets:
#   APP_URL      e.g. https://d2roulette.app  (no trailing slash)
#   CRON_SECRET  same value set in the Vercel project env

on:
  workflow_dispatch: {} # manual only for now

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger detect-games
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X GET "$APP_URL/api/cron/detect-games" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail-with-body
