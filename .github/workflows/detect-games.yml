name: Detect games

# Backfills post-match stats for lobbies where everyone left the browser
# before detection ran. Vercel's Hobby plan rejects sub-daily crons, so we
# schedule from GitHub Actions instead and hit the existing protected endpoint.
#
# Requires two repository secrets:
#   APP_URL      e.g. https://d2roulette.app  (no trailing slash)
#   CRON_SECRET  same value set in the Vercel project env

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (GitHub may delay under load)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger detect-games
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X GET "$APP_URL/api/cron/detect-games" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail-with-body
