name: Backfill Crucible results

# One-time, manually dispatched job to recompute win/loss for matches imported
# before the team-standing parse fix. Idempotent and resumable; re-run until
# playersUpdated is ~0, then remove.
on:
  workflow_dispatch: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger results backfill
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X GET "$APP_URL/api/cron/backfill-crucible-results" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail-with-body
